name: Tests
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  fast:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run fast test plan
        run: Scripts/run-tests.sh fast
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
